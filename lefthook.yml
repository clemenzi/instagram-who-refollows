pre-commit:
  jobs:
    - name: biome
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.mjs"
        - "*.cjs"
        - "*.astro"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
